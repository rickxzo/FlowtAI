<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FlowtAI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Hide scrollbar */
    #chat::-webkit-scrollbar {
      width: 0px;
    }
    #chat {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="bg-zinc-200 flex items-center justify-center h-screen">

  <div class="w-full max-w-md h-[620px] bg-white rounded-3xl border border-zinc-300 shadow-md flex flex-col overflow-hidden">

    <!-- Header -->
    <div class="px-5 py-4 border-b border-zinc-200 flex items-center justify-between bg-white">
      <h2 class="text-lg font-semibold text-zinc-800">FlowtAI</h2>
      <span class="text-xs text-green-500">● Online</span>
    </div>

    <!-- Chat -->
    <div id="chat" class="flex-1 overflow-y-auto px-4 py-6 space-y-4 text-sm bg-zinc-50">

      <!-- Empty state -->
      <div id="emptyState" class="h-full flex items-center justify-center text-center text-zinc-400">
        <p class="text-lg font-medium">What can I help with?</p>
      </div>

    </div>

    <!-- Input -->
    <div class="p-3 border-t border-zinc-200 bg-white">
      <div class="flex items-center gap-2 bg-zinc-100 rounded-xl px-3 py-2 border border-zinc-200">

        <input
          id="msg"
          placeholder="Ask anything..."
          class="flex-1 bg-transparent outline-none text-sm text-zinc-700 placeholder-zinc-400"
          onkeydown="if(event.key==='Enter') send()"
        />

        <button
          onclick="send()"
          class="bg-zinc-900 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-zinc-700 transition"
        >
          ↑
        </button>

      </div>
    </div>

  </div>

  <script>
  const params = new URLSearchParams(window.location.search);
  const agentId = params.get("agent_id") || "test";

  let convoId = localStorage.getItem("flowt_convo");
  if (!convoId) {
    convoId = Math.floor(Math.random() * 1000000);
    localStorage.setItem("flowt_convo", convoId);
  }

  function createBotMessageContainer() {
    const chat = document.getElementById("chat");
    const empty = document.getElementById("emptyState");
    if (empty) empty.remove();

    const wrapper = document.createElement("div");
    wrapper.className = "flex justify-start";

    const bubble = document.createElement("div");
    bubble.className =
      "max-w-[75%] bg-zinc-200 text-zinc-800 px-4 py-3 rounded-2xl rounded-bl-md space-y-1";

    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);

    return bubble;
  }

  function addUserMessage(text) {
    const chat = document.getElementById("chat");

    const wrapper = document.createElement("div");
    wrapper.className = "flex justify-end";

    const bubble = document.createElement("div");
    bubble.className =
      "max-w-[75%] bg-zinc-900 text-white px-4 py-2 rounded-2xl rounded-br-md";

    bubble.innerText = text;

    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);

    chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    const input = document.getElementById("msg");
    const userText = input.value.trim();

    if (!userText) return;

    addUserMessage(userText);
    input.value = "";

    const bubble = createBotMessageContainer();

    let isFinal = false;
    let finalTextNode = null;

    try {
      const res = await fetch(
        `https://flowtai-1.onrender.com/respond?agent_id=73ed20a1-091a-4b5a-a676-ad86377d8bad&input=${encodeURIComponent(userText)}&convo=67`
      );

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });

        // Split lines (important for SSE-style)
        const lines = chunk.split("\n").filter(line => line.trim() !== "");

        for (let line of lines) {
          if (line.startsWith("data:")) {
            isFinal = true;

            const clean = line.replace(/^data:\s*/, "");

            // create final text node if not exists
            if (!finalTextNode) {
              finalTextNode = document.createElement("div");
              finalTextNode.className = "text-zinc-800";
              bubble.appendChild(finalTextNode);
            }

            finalTextNode.innerText += clean;
          } else {
            // intermediate thoughts
            if (!isFinal) {
              const step = document.createElement("div");
              step.className = "text-zinc-400 text-xs";
              step.innerText = line;
              bubble.appendChild(step);
            } else {
              // after data:, keep appending
              if (!finalTextNode) {
                finalTextNode = document.createElement("div");
                finalTextNode.className = "text-zinc-800";
                bubble.appendChild(finalTextNode);
              }

              finalTextNode.innerText += line;
            }
          }
        }

        // auto scroll
        const chat = document.getElementById("chat");
        chat.scrollTop = chat.scrollHeight;
      }

    } catch (err) {
      bubble.innerHTML = `<span class="text-red-500">⚠️ Error streaming response</span>`;
    }
  }
</script>

</body>
</html>
