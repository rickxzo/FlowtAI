<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FlowtAI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Hide scrollbar */
    #chat::-webkit-scrollbar {
      width: 0px;
    }
    #chat {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="bg-zinc-200 flex items-center justify-center h-screen">

  <div class="w-full max-w-md h-[620px] bg-white rounded-3xl border border-zinc-300 shadow-md flex flex-col overflow-hidden">

    <!-- Header -->
    <div class="px-5 py-4 border-b border-zinc-200 flex items-center justify-between bg-white">
      <h2 class="text-lg font-semibold text-zinc-800">FlowtAI</h2>
      <span class="text-xs text-green-500">● Online</span>
    </div>

    <!-- Chat -->
    <div id="chat" class="flex-1 overflow-y-auto px-4 py-6 space-y-4 text-sm bg-zinc-50">

      <!-- Empty state -->
      <div id="emptyState" class="h-full flex items-center justify-center text-center text-zinc-400">
        <p class="text-lg font-medium">What can I help with?</p>
      </div>

    </div>

    <!-- Input -->
    <div class="p-3 border-t border-zinc-200 bg-white">
      <div class="flex items-center gap-2 bg-zinc-100 rounded-xl px-3 py-2 border border-zinc-200">

        <input
          id="msg"
          placeholder="Ask anything..."
          class="flex-1 bg-transparent outline-none text-sm text-zinc-700 placeholder-zinc-400"
          onkeydown="if(event.key==='Enter') send()"
        />

        <button
          onclick="send()"
          class="bg-zinc-900 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-zinc-700 transition"
        >
          ↑
        </button>

      </div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const agentId = params.get("agent_id") || "test";

    let convoId = localStorage.getItem("flowt_convo");
    if (!convoId) {
      convoId = Math.floor(Math.random() * 1000000);
      localStorage.setItem("flowt_convo", convoId);
    }

    function addMessage(sender, text) {
      const chat = document.getElementById("chat");
      const empty = document.getElementById("emptyState");

      if (empty) empty.remove();

      const wrapper = document.createElement("div");
      wrapper.className = sender === "user"
        ? "flex justify-end"
        : "flex justify-start";

      const bubble = document.createElement("div");

      if (sender === "user") {
        bubble.className =
          "max-w-[75%] bg-zinc-900 text-white px-4 py-2 rounded-2xl rounded-br-md";
      } else {
        bubble.className =
          "max-w-[75%] bg-zinc-200 text-zinc-800 px-4 py-2 rounded-2xl rounded-bl-md";
      }

      bubble.innerText = text;

      wrapper.appendChild(bubble);
      chat.appendChild(wrapper);

      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const input = document.getElementById("msg");
      const userText = input.value.trim();

      if (!userText) return;

      addMessage("user", userText);
      input.value = "";

      try {
        const res = await fetch(
          `/respond?agent_id=${agentId}&input=${encodeURIComponent(userText)}&convo=${convoId}`
        );

        const data = await res.text();

        addMessage("bot", data.replace(/^data:\s*/, "")); // fixes your "data:" issue

      } catch (err) {
        addMessage("bot", "⚠️ Error connecting to server");
      }
    }
  </script>

</body>
</html>
